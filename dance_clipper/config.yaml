# Dance Clipper 配置文件
# 舞蹈视频智能剪辑系统配置

# ==================== 基础设置 ====================

# 目标输出时长（秒）
# 例如: 15.0 适合抖音/快手
#       30.0 适合小红书/B站短视频
#       60.0 适合详细展示
target_duration: 30.0

# 时长容差（秒）
# 最终输出时长会在 target_duration ± tolerance 范围内
tolerance: 2.0

# 最小片段时长（秒）
# 每个剪辑片段至少保持这么长，保证动作完整性
min_segment_duration: 4.0

# 最大拼接段数
# 最多将几个片段拼接在一起，建议不超过3段以保证连贯性
max_segments: 2


# ==================== 音频分析设置 ====================

audio:
  # 合理的BPM范围
  # 舞蹈音乐通常在 60-180 BPM之间
  bpm_range: [60, 180]
  
  # 每小节拍数（通常是4拍）
  beats_per_measure: 4
  
  # 每乐句小节数（通常是4-8小节）
  measures_per_phrase: 4
  
  # 音频权重（0-1）
  # 音乐结构完整性在评分中的权重
  weight: 0.6


# ==================== 视频分析设置 ====================

video:
  # 分析采样率（每秒分析多少帧）
  # 越高越精确，但速度越慢
  sample_rate: 2
  
  # 场景切换检测阈值（0-1）
  # 越高越严格，只检测明显的切换
  scene_threshold: 0.3
  
  # 视频权重（0-1）
  # 动作连贯性在评分中的权重
  weight: 0.4


# ==================== 输出设置 ====================

output:
  # 输出视频编码
  video_codec: "libx264"
  
  # 输出音频编码
  audio_codec: "aac"
  
  # 视频质量（CRF值，18-28，越小质量越高）
  video_quality: 23
  
  # 音频比特率
  audio_bitrate: "128k"
  
  # 输出分辨率（可选，不填则保持原分辨率）
  # width: 1080
  # height: 1920


# ==================== 高级设置 ====================

advanced:
  # 是否启用详细日志
  verbose: true
  
  # 是否保留临时文件（用于调试）
  keep_temp: false
  
  # 并行处理的最大视频数（批量处理时使用）
  max_workers: 4
  
  # 是否生成可视化报告
  generate_report: true
